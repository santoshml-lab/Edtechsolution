<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Study OS 🔥 Viral</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
padding:20px;
}

.card{
background:#111827;
padding:15px;
border-radius:15px;
margin-bottom:15px;
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
}

button{
background:linear-gradient(45deg,#38bdf8,#9333ea);
font-weight:bold;
cursor:pointer;
}

.meme{
background:#1f2937;
padding:10px;
border-radius:10px;
margin-top:10px;
}

.small{
opacity:0.7;
font-size:12px;
}
</style>
</head>

<body>

<h2>🚀 AI Study + Meme + Viral OS</h2>

<div class="card">

<input id="topic" placeholder="Enter Topic">

<button onclick="learn()">📚 Learn</button>
<button onclick="makeMeme()">😂 Generate Meme</button>
<button onclick="shareApp()">📤 Share App</button>

<div id="lesson"></div>

</div>

<div class="card">
<h3>😂 Meme Feed</h3>
<div id="feed"></div>
</div>

<script>

const API = "https://student-learning-system-r6bi.onrender.com";

let xp = 0;
let shares = 0;

/* 📚 LEARN */
async function learn(){

let topic = document.getElementById("topic").value;
if(!topic) return;

let res = await fetch(API+"/learn",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
student_name:"User",
student_class:"8",
subject:"AI Study",
chapter:topic
})
});

let data = await res.json();

document.getElementById("lesson").innerHTML =
marked.parse(data.lesson);

xp += 10;
update();
}

/* 😂 MEME (NOW USING BACKEND) */
async function makeMeme(){

let topic = document.getElementById("topic").value;
if(!topic) return;

let res = await fetch(API+"/meme",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
message: topic
})
});

let data = await res.json();

document.getElementById("feed").innerHTML += `
<div class="meme">
${data.meme}
<button onclick="copyText(this)">Copy</button>
<button onclick="shareText('${data.meme}')">Share</button>
</div>
`;

xp += 5;
update();
}

/* 📤 SHARE APP (VIRAL LOOP) */
async function shareApp(){

let res = await fetch(API+"/share",{
method:"POST"
});

let data = await res.json();

shares += 1;
xp += data.bonus_xp;

navigator.clipboard.writeText(window.location.href);

alert("App link copied 🚀 +5 XP bonus!");

update();
}

/* COPY */
function copyText(btn){
navigator.clipboard.writeText(btn.parentElement.innerText);
alert("Copied 🔥");
}

/* SHARE MEME */
function shareText(text){

if(navigator.share){
navigator.share({
title:"AI Study OS Meme",
text:text
});
}

}

/* UPDATE UI */
function update(){
console.log("XP:",xp,"Shares:",shares);
}

</script>

</body>
</html>
