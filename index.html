<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🚀 ExamPanic AI v4</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background: radial-gradient(circle at top,#1e3a8a30,transparent),
radial-gradient(circle at bottom,#9333ea30,transparent),
#0b1020;
color:white;
min-height:100vh;
overflow-x:hidden;
}

/* FLOATING BLUR ORBS */
.orb{
position:fixed;
width:300px;
height:300px;
border-radius:50%;
filter:blur(100px);
opacity:0.4;
z-index:-1;
}

.orb1{background:#38bdf8;top:-80px;left:-80px;}
.orb2{background:#9333ea;bottom:-80px;right:-80px;}

/* HEADER */
header{
text-align:center;
padding:40px 20px;
}

header h1{
font-size:48px;
color:#38bdf8;
}

header p{
opacity:0.7;
margin-top:10px;
}

/* BADGE */
.badge{
display:inline-block;
padding:8px 16px;
background:#111827;
border:1px solid #ffffff20;
border-radius:999px;
color:#38bdf8;
margin-bottom:15px;
}

/* GRID */
.container{
width:95%;
max-width:1200px;
margin:auto;
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.1);
border-radius:20px;
padding:20px;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

/* INPUT */
input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:12px;
background:#111827;
color:white;
outline:none;
}

/* BUTTON */
button{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#38bdf8,#9333ea);
color:black;
font-weight:700;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.03);
}

/* CHAT */
.chat{
height:300px;
overflow:auto;
background:#111827;
padding:10px;
border-radius:12px;
margin-top:10px;
}

.msg{
padding:10px;
margin:8px 0;
border-radius:10px;
animation:fade 0.2s ease;
}

.user{background:#1e293b;}
.ai{background:#0f172a;border-left:3px solid #38bdf8;}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

/* LESSON */
#lesson{
margin-top:15px;
background:#0f172a;
padding:15px;
border-radius:12px;
border-left:4px solid #38bdf8;
min-height:120px;
line-height:1.7;
}

/* STATS */
.stats{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
margin-top:10px;
}

.stat{
background:#111827;
padding:12px;
border-radius:12px;
text-align:center;
}

.stat b{
color:#38bdf8;
font-size:22px;
}

/* MOBILE */
@media(max-width:768px){
.container{grid-template-columns:1fr;}
header h1{font-size:34px;}
}

</style>
</head>

<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<header>
<div class="badge">⚡ AI Study OS v4</div>
<h1>🚀 ExamPanic AI</h1>
<p>Smart Learning • Gamified • ICSE Focused</p>
</header>

<div class="container">

<!-- LEFT -->
<div class="card">

<h2>📚 Learn Engine</h2>

<input id="name" placeholder="Name">
<input id="cls" placeholder="Class">
<input id="sub" placeholder="Subject">
<input id="chap" placeholder="Chapter">

<button onclick="learn()">Generate Lesson</button>

<div id="lesson">Your AI lesson will appear here...</div>

<div class="stats">
<div class="stat"><b id="xp">0</b><br>XP</div>
<div class="stat"><b id="chapters">0</b><br>Chapters</div>
<div class="stat"><b id="streak">1</b><br>Streak</div>
</div>

</div>

<!-- RIGHT -->
<div class="card">

<h2>🤖 AI Chat</h2>

<div class="chat" id="chat"></div>

<input id="msg" placeholder="Ask anything...">

<button onclick="askAI()">Send</button>

</div>

</div>

<script>

const API = "https://student-learning-system-r6bi.onrender.com";

let xp=0, chapters=0, streak=1;
let chat=[];

/* LEARN */
async function learn(){

let res = await fetch(API+"/learn",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
student_name:document.getElementById("name").value,
student_class:document.getElementById("cls").value,
subject:document.getElementById("sub").value,
chapter:document.getElementById("chap").value
})
});

let data = await res.json();

document.getElementById("lesson").innerHTML =
marked.parse(data.lesson || "");

xp+=10;
chapters+=1;
streak+=1;

update();
}

/* CHAT */
async function askAI(){

let msg=document.getElementById("msg").value;
if(!msg) return;

chat.push({role:"user",text:msg});
renderChat();

document.getElementById("msg").value="";

try{

let res=await fetch(API+"/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:msg})
});

let data=await res.json();

chat.push({role:"ai",text:data.reply});
renderChat();

xp+=5;
update();

}catch(e){
chat.push({role:"ai",text:"Error"});
renderChat();
}

}

/* RENDER CHAT */
function renderChat(){

let box=document.getElementById("chat");
box.innerHTML="";

chat.forEach(m=>{
box.innerHTML+=`
<div class="msg ${m.role}">
${marked.parse(m.text)}
</div>`;
});

box.scrollTop=box.scrollHeight;
}

/* UPDATE STATS */
function update(){
document.getElementById("xp").innerText=xp;
document.getElementById("chapters").innerText=chapters;
document.getElementById("streak").innerText=streak;
}

update();

</script>

</body>
</html>
